backend:
  name: git-gateway
  branch: main

# Replace YOUR-SITE-NAME with your actual Netlify site address once it's live.
site_url: https://YOUR-SITE-NAME.netlify.app
display_url: https://YOUR-SITE-NAME.netlify.app

# Photos uploaded through the dashboard are stored in /uploads
media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "updates"
    label: "Updates"
    files:
      - name: "updates"
        label: "Updates Feed"
        file: "updates.json"
        description: "Add, edit, or remove the posts shown on the Updates page."
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            label_singular: "Post"
            summary: "{{title}} — {{date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Short summary (shown on the card)", name: "excerpt", widget: "text" }
              - { label: "Full update text", name: "body", widget: "text" }
